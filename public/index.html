<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Panji Online Router</title>
  <style>
    body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0b1020;color:#e5e7eb;margin:0}
    .wrap{max-width:860px;margin:40px auto;padding:24px}
    .card{background:#121a33;border:1px solid #2b355e;border-radius:16px;padding:20px}
    h1{margin:0 0 8px;font-size:28px}
    p{color:#a9b3d1}
    ul{line-height:1.9}
    a{color:#8ab4ff;text-decoration:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Panji Online Router</h1>
      <p>Single publish gateway for active pages under <code>/[slug]</code>.</p>
      <h3>Active links</h3>
      <ul>
        <li><a href="/demo/">/demo</a></li>
      </ul>
    </div>
  </div>
</body>
</html>
